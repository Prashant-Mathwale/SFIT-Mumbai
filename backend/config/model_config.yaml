lightgbm:
  objective: binary
  metric: auc
  learning_rate: 0.05
  num_leaves: 63
  max_depth: 7
  min_child_samples: 20
  feature_fraction: 0.8
  bagging_fraction: 0.8
  bagging_freq: 5
  lambda_l1: 0.1
  lambda_l2: 0.1
  is_unbalance: true
  n_estimators: 500
  random_state: 42
  n_jobs: -1

gru:
  seq_len: 8
  hidden1: 64
  hidden2: 32
  dropout: 0.3
  epochs: 30
  batch_size: 512
  lr: 0.001
  weight_decay: 0.0001
  pos_weight: 4.0

ensemble:
  C: 1.0
  max_iter: 1000
  # Meta-learner expects 2 features: [lgbm_prob, gru_prob]
  n_meta_features: 2

isolation_forest:
  n_estimators: 200
  contamination: 0.05

features:
  # These match the columns used in train_real_data.py (Lending Club dataset)
  tabular:
    - total_rec_late_fee
    - recoveries
    - last_pymnt_amnt
    - loan_amnt_div_instlmnt
    - debt_settlement_flag
    - loan_age
    - total_rec_int
    - out_prncp
    - time_since_last_credit_pull
    - time_since_last_payment
    - int_rate%
    - total_rec_prncp
  sequence:
    - total_rec_late_fee
    - recoveries
    - last_pymnt_amnt
    - loan_amnt_div_instlmnt
    - debt_settlement_flag
    - loan_age
    - total_rec_int
    - out_prncp
    - time_since_last_credit_pull
    - time_since_last_payment
    - int_rate%
    - total_rec_prncp
