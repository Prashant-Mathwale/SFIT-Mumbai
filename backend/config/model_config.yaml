lightgbm:
  boosting_type: dart
  objective: binary
  metric: auc
  learning_rate: 0.05
  num_leaves: 63
  max_depth: 7
  min_child_samples: 20
  feature_fraction: 0.8
  bagging_fraction: 0.8
  bagging_freq: 5
  lambda_l1: 0.1
  lambda_l2: 0.1
  is_unbalance: true
  n_estimators: 500
  random_state: 42
  n_jobs: -1

gru:
  seq_len: 8
  hidden1: 64
  hidden2: 32
  dropout: 0.3
  epochs: 30
  batch_size: 512
  lr: 0.001
  weight_decay: 0.0001
  pos_weight: 4.0

ensemble:
  C: 1.0
  max_iter: 1000
  n_meta_features: 5
  features:
    - lgbm_prob
    - gru_prob
    - week_number
    - stress_level
    - credit_utilization

isolation_forest:
  n_estimators: 200
  contamination: 0.08   

features:
  tabular:
    - salary_delay_days
    - savings_wow_delta_pct
    - atm_withdrawal_count_7d
    - atm_withdrawal_amount_7d
    - discretionary_spend_7d
    - lending_upi_count_7d
    - lending_upi_amount_7d
    - failed_autodebit_count
    - utility_payment_delay_days
    - gambling_spend_7d
    - credit_utilization
    - net_cashflow_7d
    - customer_segment
    - round_number_withdrawal_count_7d
    - weekend_spend_ratio
    - net_cashflow_trend_slope

  sequence:
    - salary_delay_days
    - savings_wow_delta_pct
    - atm_withdrawal_count_7d
    - atm_withdrawal_amount_7d
    - discretionary_spend_7d
    - lending_upi_count_7d
    - lending_upi_amount_7d
    - failed_autodebit_count
    - utility_payment_delay_days
    - gambling_spend_7d
    - credit_utilization
    - net_cashflow_7d
    - customer_segment
    - round_number_withdrawal_count_7d
    - weekend_spend_ratio
    - net_cashflow_trend_slope